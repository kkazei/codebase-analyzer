services:
  backend:
    build:
      context: ./backend
    container_name: codebase-analyzer-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: codebase-analyzer-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

volumes:
  frontend_node_modules:
